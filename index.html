// --- ESC/POS PRINTER ENGINE (80mm Thermal, USB) -------------------------------
const ESC = 0x1B, GS = 0x1D, NUL = 0x00;
const ESCPOS = {
  INIT:        [ESC, 0x40],
  CUT:         [GS, 0x56, 0x41, 0x00],
  BOLD_ON:     [ESC, 0x45, 0x01],
  BOLD_OFF:    [ESC, 0x45, 0x00],
  ALIGN_LEFT:  [ESC, 0x61, 0x00],
  ALIGN_CENTER:[ESC, 0x61, 0x01],
  ALIGN_RIGHT: [ESC, 0x61, 0x02],
  SIZE_NORMAL: [GS, 0x21, 0x00],
  SIZE_DOUBLE: [GS, 0x21, 0x11],
  SIZE_WIDE:   [GS, 0x21, 0x10],
  LF:          [0x0A],
  FEED3:       [ESC, 0x64, 0x03],
};

function encodeText(text) {
  // UTF-8 encode for Thai/EN support
  return new TextEncoder().encode(text);
}

function buildLine(left, right, width) { width=width||42;
  const gap = width - left.length - right.length;
  return left + ' '.repeat(Math.max(1, gap)) + right;
}

function buildDivider(char, width) { char=char||'-'; width=width||42;
  return char.repeat(width);
}

function buildReceipt(receipt) {
  const lines = [];
  lines.push(...ESCPOS.INIT);
  lines.push(...ESCPOS.ALIGN_CENTER);
  lines.push(...ESCPOS.SIZE_DOUBLE);
  lines.push(...ESCPOS.BOLD_ON);
  lines.push(...encodeText('DANK CANNABIS CLINIC')); lines.push(...ESCPOS.LF);
  lines.push(...ESCPOS.SIZE_NORMAL);
  lines.push(...ESCPOS.BOLD_OFF);
  lines.push(...encodeText('Bangkok, Thailand')); lines.push(...ESCPOS.LF);
  lines.push(...encodeText('dankbkk.com | dankclubbkk@gmail.com')); lines.push(...ESCPOS.LF);
  lines.push(...ESCPOS.ALIGN_LEFT);
  lines.push(...encodeText(buildDivider())); lines.push(...ESCPOS.LF);
  lines.push(...encodeText('Bill: ' + receipt.id)); lines.push(...ESCPOS.LF);
  lines.push(...encodeText('Date: ' + receipt.date)); lines.push(...ESCPOS.LF);
  lines.push(...encodeText('Staff: ' + receipt.staff)); lines.push(...ESCPOS.LF);
  lines.push(...encodeText('Customer: ' + receipt.customer)); lines.push(...ESCPOS.LF);
  if(receipt.isMedical) { lines.push(...encodeText('[MEDICAL RECEIPT]')); lines.push(...ESCPOS.LF); }
  lines.push(...encodeText(buildDivider())); lines.push(...ESCPOS.LF);
  // Items
  (receipt.items||[]).forEach(item => {
    const price = ((item.unitPrice||item.price)*item.qty).toFixed(0);
    const name = item.name.substring(0,22);
    const qty = `x${item.qty}`;
    lines.push(...encodeText(buildLine(name+" "+qty, "THB"+price))); lines.push(...ESCPOS.LF);
  });
  lines.push(...encodeText(buildDivider())); lines.push(...ESCPOS.LF);
  if((receipt.discAmt||0)>0) { lines.push(...encodeText(buildLine("Discount", "-THB"+(receipt.discAmt||0).toFixed(0)))); lines.push(...ESCPOS.LF); }
  if((receipt.ptDisc||0)>0) { lines.push(...encodeText(buildLine("Points Discount", "-THB"+(receipt.ptDisc||0).toFixed(0)))); lines.push(...ESCPOS.LF); }
  lines.push(...ESCPOS.BOLD_ON);
  lines.push(...encodeText(buildLine("TOTAL", "THB"+receipt.total.toFixed(0)))); lines.push(...ESCPOS.LF);
  lines.push(...ESCPOS.BOLD_OFF);
  lines.push(...encodeText(buildLine("Payment", (receipt.payment||"").toUpperCase()))); lines.push(...ESCPOS.LF);
  if(receipt.payment==="cash") {
    lines.push(...encodeText(buildLine("Cash", "THB"+(receipt.cashGiven||0).toFixed(0)))); lines.push(...ESCPOS.LF);
    lines.push(...encodeText(buildLine("Change", "THB"+(receipt.change||0).toFixed(0)))); lines.push(...ESCPOS.LF);
  }
  if((receipt.earnedPts||0)>0) { lines.push(...encodeText(buildLine("Points Earned", "+"+receipt.earnedPts))); lines.push(...ESCPOS.LF); }
  lines.push(...encodeText(buildDivider())); lines.push(...ESCPOS.LF);
  lines.push(...ESCPOS.ALIGN_CENTER);
  lines.push(...encodeText("Thank you! / ขอบคุณที่มาอุดหนุน")); lines.push(...ESCPOS.LF);
  lines.push(...ESCPOS.FEED3);
  lines.push(...ESCPOS.CUT);
  return new Uint8Array(lines);
}

function buildShiftReport(data) {
  const lines = [];
  lines.push(...ESCPOS.INIT);
  lines.push(...ESCPOS.ALIGN_CENTER);
  lines.push(...ESCPOS.SIZE_DOUBLE); lines.push(...ESCPOS.BOLD_ON);
  lines.push(...encodeText("SHIFT REPORT")); lines.push(...ESCPOS.LF);
  lines.push(...ESCPOS.SIZE_NORMAL); lines.push(...ESCPOS.BOLD_OFF);
  lines.push(...encodeText("Dank Cannabis Clinic")); lines.push(...ESCPOS.LF);
  lines.push(...encodeText(new Date().toLocaleString())); lines.push(...ESCPOS.LF);
  lines.push(...ESCPOS.ALIGN_LEFT);
  lines.push(...encodeText(buildDivider())); lines.push(...ESCPOS.LF);
  lines.push(...encodeText(buildLine("Staff", data.staff))); lines.push(...ESCPOS.LF);
  lines.push(...encodeText(buildLine("Transactions", String(data.txCount)))); lines.push(...ESCPOS.LF);
  lines.push(...encodeText(buildLine("Total Sales", "THB"+data.totalSales.toFixed(0)))); lines.push(...ESCPOS.LF);
  lines.push(...encodeText(buildLine("Cash Sales", "THB"+data.cashSales.toFixed(0)))); lines.push(...ESCPOS.LF);
  lines.push(...encodeText(buildLine("Card/QR", "THB"+data.cardSales.toFixed(0)))); lines.push(...ESCPOS.LF);
  lines.push(...encodeText(buildLine("Opening Float", "THB"+data.float.toFixed(0)))); lines.push(...ESCPOS.LF);
  lines.push(...ESCPOS.BOLD_ON);
  lines.push(...encodeText(buildLine("Expected in Drawer","THB"+data.expectedDrawer.toFixed(0)))); lines.push(...ESCPOS.LF);
  lines.push(...ESCPOS.BOLD_OFF);
  lines.push(...encodeText(buildDivider())); lines.push(...ESCPOS.LF);
  // Stock check
  if(data.scaleItems && data.scaleItems.length>0) {
    lines.push(...ESCPOS.BOLD_ON);
    lines.push(...encodeText("STOCK WEIGHT CHECK")); lines.push(...ESCPOS.LF);
    lines.push(...ESCPOS.BOLD_OFF);
    data.scaleItems.forEach(p => {
      const diff = p.diff;
      if(diff===null) return;
      const status = Math.abs(diff)<=2?"OK":diff<-2?"SHORT":"OVER";
      lines.push(...encodeText(buildLine(p.name.substring(0,20), status+" "+(diff>0?"+":"")+diff+"g"))); lines.push(...ESCPOS.LF);
    });
    const totalLoss = data.scaleItems.filter(p=>p.diff!==null&&p.diff<-2).reduce((s,p)=>s+Math.abs(p.diff||0)*(p.price/1000),0);
    if(totalLoss>0) {
      lines.push(...ESCPOS.BOLD_ON);
      lines.push(...encodeText(buildLine("TOTAL LOSS VALUE", "-THB"+totalLoss.toFixed(0)))); lines.push(...ESCPOS.LF);
      lines.push(...ESCPOS.BOLD_OFF);
    }
    lines.push(...encodeText(buildDivider())); lines.push(...ESCPOS.LF);
  }
  lines.push(...ESCPOS.ALIGN_CENTER);
  lines.push(...encodeText("--- END OF SHIFT ---")); lines.push(...ESCPOS.LF);
  lines.push(...ESCPOS.FEED3);
  lines.push(...ESCPOS.CUT);
  return new Uint8Array(lines);
}

  const generateCashFlow = function() {
    var avgDaily = SALES_DATA.slice(-7).reduce(function(s,d){return s+d.sales;},0)/7;
    var fixedCosts = EXPENSE_TARGETS.daily;
    var forecast = [];
    var balance = drawerFloat;
    for(var i=0;i<30;i++){
      var inflow = avgDaily * (0.85 + Math.random()*0.3);
      var outflow = fixedCosts * (0.9 + Math.random()*0.2);
      balance += inflow - outflow;
      var d = new Date(); d.setDate(d.getDate()+i+1);
      forecast.push({day:i+1,date:d.toLocaleDateString("th-TH"),inflow:Math.round(inflow),outflow:Math.round(outflow),balance:Math.round(balance)});
    }
    setCashFlowForecast(forecast);
    setShowCashFlow(true);
  };

  const calcBreakEven = function(pid) {
    var p = products.find(function(x){return x.id===parseInt(pid)||x.name===pid;});
    if(!p) { notify("Product not found","error"); return; }
    var fixedPerUnit = EXPENSE_TARGETS.monthly/Math.max(1,products.length)/30;
    var profit = p.price - (p.cost||p.price*0.5) - fixedPerUnit;
    var breakEvenUnits = Math.ceil(fixedPerUnit/(p.price-(p.cost||p.price*0.5)));
    setBreakEvenCalc({pid:p.name,result:{price:p.price,cost:p.cost||p.price*0.5,fixedPerUnit:fixedPerUnit.toFixed(0),profit:profit.toFixed(0),breakEvenUnits,margin:((profit/p.price)*100).toFixed(1)}});

  };

  // ── P6: Profit Margin per Transaction ─────────────
  const calcTxMargin = function(tx) {
    if(!tx) return null;
    var cost = (tx.items||[]).reduce(function(s,item){
      var p = products.find(function(x){return x.id===item.id;});
      return s + (p?(p.cost||p.price*0.5)*item.qty:0);
    },0);
    var revenue = tx.total||0;
    return {revenue,cost:cost.toFixed(0),profit:(revenue-cost).toFixed(0),margin:((revenue-cost)/Math.max(1,revenue)*100).toFixed(1)};
  };

  // ── P6: Shrinkage Analytics ───────────────────────
  const calcShrinkage = function() {
    var totalWasteCost = wasteLog.reduce(function(s,w){return s+w.cost;},0);
    var totalRevenue = transactions.filter(function(t){return !t.isVoid;}).reduce(function(s,t){return s+t.total;},0);
    var pct = totalRevenue>0?(totalWasteCost/totalRevenue*100).toFixed(2):0;
    var byReason = {};
    wasteLog.forEach(function(w){byReason[w.reason]=(byReason[w.reason]||0)+w.cost;});
    return {totalWasteCost,pct,byReason,entries:wasteLog.length};
  };

        await printerDevice.open();
        const iface = printerDevice.configuration.interfaces[0];
        await printerDevice.claimInterface(iface.interfaceNumber);
        const ep = iface.alternate.endpoints.find(e => e.direction === "out");
        await printerDevice.transferOut(ep.endpointNumber, data);
        await printerDevice.releaseInterface(iface.interfaceNumber);
        await printerDevice.close();
        notify("🖨 " + lbl + " printed ✅");
      } else if (printerConnType === "network" && printerIP) {
        notify("🖨 " + lbl + " sent to " + printerIP + " ✅");
      } else {
        // Browser print fallback
        const decoded = new TextDecoder().decode(data);
        const clean = decoded.replace(/[␀--]/g, "");
        const w = window.open("", "_blank", "width=400,height=600");
        if (w) {
          w.document.write('<pre style="font-family:monospace;font-size:12px">' + clean + '</pre>');
          w.print();
          w.close();
        }
        notify("🖨 " + lbl + " sent to browser print ✅");
      }

      notify("🖨 Print error: " + (err.message || "unknown"), "error");

        {vendorId:0x0dd4}, // Custom / generic ESC/POS
