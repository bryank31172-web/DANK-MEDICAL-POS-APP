<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Product QR Labels · DANK Cannabis Club</title>
<style>
  :root{--green:#1f9d55}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#eef1ee;color:#111;padding:18px}
  .bar{max-width:1000px;margin:0 auto 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  h1{font-size:19px}
  .bar .sp{flex:1}
  select,button{font:inherit;padding:9px 14px;border-radius:9px;border:1px solid #cbd3cb;background:#fff;cursor:pointer}
  button.primary{background:var(--green);color:#fff;border:none;font-weight:700}
  .hint{max-width:1000px;margin:0 auto 14px;color:#556;font-size:13px}
  .sheet{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .label{border:1px solid #cfd6cf;border-radius:12px;background:#fff;padding:12px;display:flex;gap:12px;align-items:center;break-inside:avoid}
  .qr{width:96px;height:96px;flex:none;display:flex;align-items:center;justify-content:center}
  .qr img,.qr canvas{width:96px;height:96px}
  .meta{min-width:0}
  .code{font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:800;font-size:18px;letter-spacing:.5px}
  .nm{font-weight:700;font-size:13px;margin-top:2px;line-height:1.15}
  .sub{color:#667;font-size:11px;margin-top:3px}
  .brand{color:var(--green);font-weight:800;font-size:10px;letter-spacing:1px;margin-top:4px}
  @media print{
    body{background:#fff;padding:0}
    .bar,.hint{display:none}
    .sheet{gap:6px;grid-template-columns:repeat(3,1fr)}
    .label{border:1px solid #bbb}
  }
</style>
</head>
<body>
  <div class="bar">
    <h1>🌿 Product QR Labels</h1>
    <span class="sp"></span>
    <label>Category:
      <select id="catSel" onchange="render()"><option value="">All</option></select>
    </label>
    <label>Columns:
      <select id="colSel" onchange="setCols()"><option>2</option><option selected>3</option><option>4</option></select>
    </label>
    <button class="primary" onclick="window.print()">🖨️ Print / Save PDF</button>
  </div>
  <div class="hint">Every product below has a unique code and a scannable QR (the QR encodes the code). Print onto sticker sheets, or “Save as PDF”. Any USB QR/barcode scanner or the staff app’s Count tab reads these.</div>
  <div class="sheet" id="sheet"></div>

<script>
let PRODUCTS=[];
const $=s=>document.querySelector(s);
function setCols(){ $('#sheet').style.gridTemplateColumns=`repeat(${$('#colSel').value},1fr)`; }
function makeQR(el,text){
  el.innerHTML="";
  if(window.QRCode){ new QRCode(el,{text,width:96,height:96,correctLevel:QRCode.CorrectLevel.M}); }
  else { el.innerHTML=`<div style="font:10px monospace;word-break:break-all">${text}</div>`; }
}
function render(){
  const cat=$('#catSel').value;
  const list=PRODUCTS.filter(p=>!cat||p.category===cat);
  const sheet=$('#sheet'); sheet.innerHTML="";
  list.forEach(p=>{
    const d=document.createElement('div'); d.className='label';
    d.innerHTML=`<div class="qr"></div>
      <div class="meta">
        <div class="code">${p.code}</div>
        <div class="nm">${p.name}</div>
        <div class="sub">${[p.category,p.type,p.thc&&('THC '+p.thc)].filter(Boolean).join(' · ')}${p.price?(' · ฿'+p.price):''}</div>
        <div class="brand">DANK CANNABIS CLUB</div>
      </div>`;
    sheet.appendChild(d);
    makeQR(d.querySelector('.qr'), p.code);
  });
}
function boot(d){
  PRODUCTS=d;
  const cats=[...new Set(d.map(p=>p.category).filter(Boolean))].sort();
  $('#catSel').insertAdjacentHTML('beforeend', cats.map(c=>`<option>${c}</option>`).join(''));
  const go=()=>window.QRCode?render():setTimeout(go,120); go();
}
// Prefer embedded data (works when opened standalone); fall back to the live file.
let embedded=[];
try{ embedded=JSON.parse(document.getElementById('embedded').textContent); }catch(e){}
if(Array.isArray(embedded)&&embedded.length) boot(embedded);
else fetch('product-codes.json').then(r=>r.json()).then(boot)
  .catch(()=>{ $('#sheet').innerHTML='<p style="padding:20px">Could not load product-codes.json — open this page from the deployed site (same folder).</p>'; });
</script>
<script src="i18n.js"></script>
